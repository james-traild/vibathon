<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>World Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1923;
      color: #e0e6ed;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 24px;
      background: #131f2e;
      border-bottom: 1px solid #1e3048;
      display: flex;
      align-items: center;
      gap: 12px;
      z-index: 1000;
    }

    header .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #3b82f6, #06b6d4);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    header .subtitle {
      font-size: 13px;
      color: #6b8299;
      margin-left: auto;
    }

    .controls {
      position: absolute;
      top: 76px;
      right: 16px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .control-group {
      background: #131f2e;
      border: 1px solid #1e3048;
      border-radius: 10px;
      overflow: hidden;
    }

    .control-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #9fb3c8;
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      transition: background 0.15s, color 0.15s;
      border-bottom: 1px solid #1e3048;
    }

    .control-btn:last-child {
      border-bottom: none;
    }

    .control-btn:hover {
      background: #1a2d42;
      color: #e0e6ed;
    }

    .control-btn.active {
      color: #3b82f6;
      background: #0d1e30;
    }

    .control-btn .icon {
      font-size: 15px;
      width: 18px;
      text-align: center;
    }

    #map {
      flex: 1;
    }

    .leaflet-container {
      background: #0d1520;
    }

    .status-bar {
      padding: 8px 16px;
      background: #0b1520;
      border-top: 1px solid #1e3048;
      display: flex;
      gap: 24px;
      font-size: 12px;
      color: #4a6580;
    }

    .status-item span {
      color: #7aa3c0;
    }

    .leaflet-control-zoom {
      border: none !important;
      box-shadow: none !important;
    }

    .leaflet-control-zoom a {
      background: #131f2e !important;
      color: #9fb3c8 !important;
      border: 1px solid #1e3048 !important;
      font-size: 16px !important;
    }

    .leaflet-control-zoom a:hover {
      background: #1a2d42 !important;
      color: #e0e6ed !important;
    }

    .leaflet-control-attribution {
      background: rgba(11, 21, 32, 0.85) !important;
      color: #3a5570 !important;
      font-size: 10px !important;
    }

    .leaflet-control-attribution a {
      color: #4a7090 !important;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">🌍</div>
    <h1>World Map</h1>
    <div class="subtitle">Interactive Globe Explorer</div>
  </header>

  <div id="map"></div>

  <div class="controls">
    <div class="control-group">
      <button class="control-btn active" id="btn-dark" onclick="setLayer('dark')">
        <span class="icon">🌑</span> Dark
      </button>
      <button class="control-btn" id="btn-satellite" onclick="setLayer('satellite')">
        <span class="icon">🛰️</span> Satellite
      </button>
      <button class="control-btn" id="btn-street" onclick="setLayer('street')">
        <span class="icon">🗺️</span> Streets
      </button>
    </div>
    <div class="control-group">
      <button class="control-btn" onclick="map.setView([0, 0], 2)">
        <span class="icon">🌐</span> Reset View
      </button>
      <button class="control-btn" onclick="locateMe()">
        <span class="icon">📍</span> My Location
      </button>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-item">Lat: <span id="lat">0.000</span></div>
    <div class="status-item">Lng: <span id="lng">0.000</span></div>
    <div class="status-item">Zoom: <span id="zoom">2</span></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const layers = {
      dark: L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
        maxZoom: 19
      }),
      satellite: L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: '&copy; <a href="https://www.esri.com/">Esri</a>',
        maxZoom: 19
      }),
      street: L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
        maxZoom: 19
      })
    };

    let currentLayer = 'dark';

    const map = L.map('map', {
      center: [20, 0],
      zoom: 2,
      minZoom: 2,
      layers: [layers.dark],
      zoomControl: true
    });

    function setLayer(name) {
      map.removeLayer(layers[currentLayer]);
      map.addLayer(layers[name]);
      currentLayer = name;
      document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('btn-' + name).classList.add('active');
    }

    function locateMe() {
      map.locate({ setView: true, maxZoom: 8 });
    }

    map.on('mousemove', e => {
      document.getElementById('lat').textContent = e.latlng.lat.toFixed(3);
      document.getElementById('lng').textContent = e.latlng.lng.toFixed(3);
    });

    map.on('zoomend', () => {
      document.getElementById('zoom').textContent = map.getZoom();
    });

    // Add a few landmark markers
    const landmarks = [
      { lat: 48.8566, lng: 2.3522,  name: 'Paris' },
      { lat: 40.7128, lng: -74.006, name: 'New York' },
      { lat: 35.6762, lng: 139.6503, name: 'Tokyo' },
      { lat: -33.8688, lng: 151.2093, name: 'Sydney' },
      { lat: 55.7558, lng: 37.6176, name: 'Moscow' },
      { lat: -23.5505, lng: -46.6333, name: 'São Paulo' },
      { lat: 1.3521, lng: 103.8198, name: 'Singapore' },
      { lat: 30.0444, lng: 31.2357, name: 'Cairo' },
    ];

    const markerIcon = L.divIcon({
      className: '',
      html: '<div style="width:8px;height:8px;background:#3b82f6;border:2px solid #60a5fa;border-radius:50%;box-shadow:0 0 6px #3b82f680"></div>',
      iconSize: [8, 8],
      iconAnchor: [4, 4]
    });

    landmarks.forEach(({ lat, lng, name }) => {
      L.marker([lat, lng], { icon: markerIcon })
        .addTo(map)
        .bindPopup(`<b style="color:#3b82f6">${name}</b>`, { className: 'dark-popup' });
    });
  </script>

  <style>
    .dark-popup .leaflet-popup-content-wrapper {
      background: #131f2e;
      color: #e0e6ed;
      border: 1px solid #1e3048;
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    }
    .dark-popup .leaflet-popup-tip {
      background: #131f2e;
    }
  </style>

</body>
</html>
